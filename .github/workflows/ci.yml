name: Terraform CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TF_VERSION: "1.9.0"
  TFLINT_VERSION: "v0.50.3"
  S3_MODULE: terraform/modules/s3

jobs:
  # ──────────────────────────────────────────────────────────────
  # Stage 1: Static Analysis
  # Runs on every push. Fast, free, no AWS credentials needed.
  # fmt covers all of terraform/; validate runs per-module.
  # ──────────────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      # Pure AWS modules — no provider config needed
      - name: Validate — s3
        run: terraform init -backend=false && terraform validate
        working-directory: terraform/modules/s3

      - name: Validate — iam-unity-catalog
        run: terraform init -backend=false && terraform validate
        working-directory: terraform/modules/iam-unity-catalog

      # Databricks modules — DATABRICKS_HOST required to satisfy provider init
      - name: Validate — workspace
        run: terraform init -backend=false && terraform validate
        working-directory: terraform/modules/workspace
        env:
          DATABRICKS_HOST: https://accounts.cloud.databricks.com
          DATABRICKS_TOKEN: dummy

      - name: Validate — unity-catalog
        run: terraform init -backend=false && terraform validate
        working-directory: terraform/modules/unity-catalog
        env:
          DATABRICKS_HOST: https://accounts.cloud.databricks.com
          DATABRICKS_TOKEN: dummy

      # The databricks module uses configuration_aliases = [databricks.workspace]
      # and cannot be validated standalone — the alias is injected by the root module.
      # It is covered by fmt + tflint instead.

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: TFLint — s3
        run: tflint --init && tflint --format compact
        working-directory: terraform/modules/s3

      - name: TFLint — iam-unity-catalog
        run: tflint --init && tflint --format compact
        working-directory: terraform/modules/iam-unity-catalog

  # ──────────────────────────────────────────────────────────────
  # Stage 2: Mock Unit Tests
  # Runs on every push. Requires Terraform 1.7+ mock providers.
  # No AWS credentials needed. Cost: $0.
  # ──────────────────────────────────────────────────────────────
  mock-tests:
    name: Mock Unit Tests
    runs-on: ubuntu-latest
    needs: [static-analysis]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ env.S3_MODULE }}

      - name: Run Mock Unit Tests
        run: terraform test -filter=tests/mock_unit.tftest.hcl -verbose
        working-directory: ${{ env.S3_MODULE }}

  # ──────────────────────────────────────────────────────────────
  # Stage 3: Plan Validation Tests
  # Runs on every push. Uses dummy AWS creds defined in the test
  # file itself — no repository secrets needed.
  # ──────────────────────────────────────────────────────────────
  plan-validation:
    name: Plan Validation
    runs-on: ubuntu-latest
    needs: [mock-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ env.S3_MODULE }}

      - name: Run Plan Validation Tests
        run: terraform test -filter=tests/plan_validation.tftest.hcl -verbose
        working-directory: ${{ env.S3_MODULE }}

  # ──────────────────────────────────────────────────────────────
  # Stage 4: Integration Tests (merge to main only)
  # Creates real AWS resources via terraform test command.
  # Resources are auto-destroyed after each run block.
  # ──────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Apply)
    runs-on: ubuntu-latest
    needs: [plan-validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ env.S3_MODULE }}

      - name: Run Apply Integration Tests
        run: terraform test -filter=tests/apply_encryption.tftest.hcl -verbose
        working-directory: ${{ env.S3_MODULE }}
        timeout-minutes: 15
